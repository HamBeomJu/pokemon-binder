<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéBinder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --pw: 105px;
            --ph: calc(var(--pw) * 88 / 63);
            --gap: 9px;
            --pp: 16px;
            --sp: 12px;
            /* 12포켓: 4열이 3열과 같은 총 너비 유지 */
            --pw12: calc((var(--pw) * 3 - var(--gap)) / 4);
            --ph12: calc(var(--pw12) * 88 / 63);
            /* 탑로더: 3×3이지만 포켓이 더 큰 카드용 (1.15× 크기) */
            --pwTL: calc(var(--pw) * 1.15);
            --phTL: calc(var(--pwTL) * 91 / 67);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #08080f;
            min-height: 100vh; color: #fff;
            display: flex; overflow: hidden;
        }

        /* ══ SIDEBAR ══ */
        .sidebar {
            width: 220px; flex-shrink: 0;
            background: #0c0c18;
            border-right: 1px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column;
        }
        .sidebar-logo {
            padding: 18px 16px 14px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; gap: 10px;
        }
        .logo-icon {
            width: 28px; height: 28px;
            background: linear-gradient(135deg, #5858ff, #9040ff);
            border-radius: 7px;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px;
        }
        .logo-text {
            font-size: 14px; font-weight: 700; letter-spacing: -0.03em;
            background: linear-gradient(135deg, #c0c0ff, #fff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .sidebar-label {
            font-size: 10px; font-weight: 600;
            color: rgba(255,255,255,0.2);
            letter-spacing: 0.08em; text-transform: uppercase;
            padding: 14px 16px 6px;
        }
        .binder-list { flex: 1; overflow-y: auto; padding: 0 6px; }
        .binder-list::-webkit-scrollbar { width: 3px; }
        .binder-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

        .binder-item {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 10px; border-radius: 7px;
            cursor: pointer; transition: background 0.12s;
            margin-bottom: 1px; position: relative;
        }
        .binder-item:hover { background: rgba(255,255,255,0.05); }
        .binder-item.active { background: rgba(88,88,255,0.12); }
        .binder-item.active .b-name { color: #a0a0ff; }

        .b-dot {
            width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
            cursor: pointer; transition: transform 0.15s;
        }
        .b-dot:hover { transform: scale(1.3); }

        .b-name {
            font-size: 12.5px; font-weight: 500;
            color: rgba(255,255,255,0.65);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            flex: 1; cursor: pointer;
        }
        .b-name:hover { color: rgba(255,255,255,0.9); }

        .b-del {
            opacity: 0; font-size: 14px; color: rgba(255,255,255,0.2);
            background: none; border: none; cursor: pointer;
            padding: 0 2px; transition: opacity 0.12s, color 0.12s;
            line-height: 1; flex-shrink: 0;
        }
        .binder-item:hover .b-del { opacity: 1; }
        .b-del:hover { color: #ff6060; }

        .sidebar-add {
            margin: 6px; padding: 8px;
            border: 1px dashed rgba(255,255,255,0.09);
            border-radius: 7px; text-align: center;
            font-size: 11.5px; color: rgba(255,255,255,0.28);
            cursor: pointer; transition: all 0.12s;
            display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .sidebar-add:hover { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.03); }

        .sidebar-footer {
            padding: 10px;
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; gap: 8px;
        }
        .avatar {
            width: 28px; height: 28px;
            background: linear-gradient(135deg, #3030aa, #6040cc);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.7); flex-shrink: 0;
        }
        .login-hint { font-size: 11px; color: rgba(255,255,255,0.3); }
        .login-btn-sm {
            margin-left: auto; font-size: 10px; padding: 4px 8px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.09);
            border-radius: 5px; color: rgba(255,255,255,0.45); cursor: pointer; transition: all 0.12s;
        }
        .login-btn-sm:hover { background: rgba(255,255,255,0.1); color: #fff; }

        /* ══ MAIN ══ */
        .main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }

        /* Topbar */
        .topbar {
            flex-shrink: 0; padding: 0 24px; height: 52px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; gap: 10px;
        }
        .tb-title {
            font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.88);
            cursor: pointer; border-radius: 4px; padding: 2px 4px; margin: -2px -4px;
            transition: background 0.12s;
        }
        .tb-title:hover { background: rgba(255,255,255,0.06); }
        .tb-title:hover::after { content: ' ✏️'; font-size: 10px; cursor: text; }

        .tb-badge {
            font-size: 10px; font-weight: 600; padding: 3px 8px;
            background: rgba(88,88,255,0.14); border: 1px solid rgba(88,88,255,0.28);
            border-radius: 20px; color: #9090ff; letter-spacing: 0.02em;
            cursor: pointer; transition: background 0.12s;
            user-select: none;
        }
        .tb-badge:hover { background: rgba(88,88,255,0.24); }
        .tb-badge:hover::after { content: ' ↻'; }

        .tb-count { font-size: 11.5px; color: rgba(255,255,255,0.28); }

        .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 7px; }
        .sz-btn {
            width: 24px; height: 24px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.09);
            border-radius: 5px; color: rgba(255,255,255,0.38); font-size: 14px;
            cursor: pointer; transition: all 0.12s; user-select: none;
        }
        .sz-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .sz-btn:disabled { opacity: 0.18; cursor: default; pointer-events: none; }
        .sz-lbl { font-size: 10px; color: rgba(255,255,255,0.2); min-width: 28px; text-align: center; user-select: none; }

        /* Inline edit input */
        .inline-edit {
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 4px; color: #fff; outline: none;
            font-family: inherit; font-size: inherit; font-weight: inherit;
            padding: 2px 6px;
        }

        /* ══ STAGE ══ */
        .stage {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 20px; padding: 20px;
            overflow-x: hidden; overflow-y: auto; /* 탭 돌출로 인한 가로 스크롤 방지 */
        }

        /* Binder perspective */
        .binder-persp { perspective: 3000px; perspective-origin: 50% 50%; }

        .binder-outer {
            display: flex; position: relative;
            border-radius: 8px;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.06),
                0 24px 55px rgba(0,0,0,0.9),
                0 55px 110px rgba(0,0,0,0.6);
            animation: binderInit 0.2s 0.08s both;
        }
        @keyframes binderInit { from { opacity: 0; } to { opacity: 1; } }

        .zone { position: relative; flex-shrink: 0; overflow: hidden; }

        .binder-page { padding: var(--pp); position: relative; }
        .binder-page.left  { background: linear-gradient(155deg, #1d1d2a 0%, #131319 100%); }
        .binder-page.right { background: linear-gradient(205deg, #1c1c28 0%, #111116 100%); }

        .page-surface {
            background: linear-gradient(145deg, #202030, #161620);
            border-radius: 4px; padding: var(--sp);
            overflow: visible;
            box-shadow: inset 0 0 35px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.03);
        }
        .page-stack {
            position: absolute; bottom: -2px; left: 6px; right: 6px;
            height: 5px; background: #0a0a10; border-radius: 0 0 4px 4px;
        }

        .spine {
            width: 18px; flex-shrink: 0;
            background: linear-gradient(to right, #040408 0%, #141420 38%, #141420 62%, #040408 100%);
            position: relative; z-index: 10;  /* 항상 flipper 위에 */
        }
        .spine::after {
            content: ''; position: absolute; inset: 0;
            background: repeating-linear-gradient(180deg,
                transparent 0, transparent 20px,
                rgba(0,0,0,0.28) 20px, rgba(0,0,0,0.28) 21px);
        }

        /* ── Flippers (v1 mechanism) ── */
        .flipper { position: absolute; inset: 0; transform-style: preserve-3d; pointer-events: none; }
        #flipper-R { transform-origin: left center; z-index: 4; }
        #flipper-L { transform-origin: right center; z-index: 5; display: none; }

        .flip-face {
            backface-visibility: hidden; -webkit-backface-visibility: hidden;
            position: absolute; inset: 0;
        }
        #flip-R-back { transform: rotateY(180deg); }
        #flip-L-back { transform: rotateY(-180deg); }

        .pg-shadow {
            position: absolute; inset: 0; pointer-events: none; z-index: 6;
            background: rgba(0,0,0,0); transition: background 0.05s;
        }

        /* Glow */
        .binder-glow { position: relative; }
        .binder-glow::before {
            content: ''; position: absolute; inset: -50px;
            background: radial-gradient(ellipse at center, rgba(70,70,190,0.07), transparent 68%);
            pointer-events: none;
        }

        /* ── Pockets ── */
        .pocket-grid {
            display: grid;
            grid-template-columns: repeat(3, var(--pw));
            gap: var(--gap);
        }
        /* 12포켓 */
        .pocket-grid.grid-12 {
            grid-template-columns: repeat(4, var(--pw12));
        }
        .pocket-grid.grid-12 .pocket {
            width: var(--pw12) !important;
            height: var(--ph12) !important;
        }
        /* 탑로더 */
        .pocket-grid.grid-tl {
            grid-template-columns: repeat(3, var(--pwTL));
        }
        .pocket-grid.grid-tl .pocket {
            width: var(--pwTL) !important;
            height: var(--phTL) !important;
            border-width: 2px;
            border-color: rgba(210,228,255,0.18);
            border-radius: 5px;
            background: rgba(210,228,255,0.04);
        }
        .pocket-grid.grid-tl .pocket::after {
            width: 40%; height: 5px;
            background: rgba(255,255,255,0.07);
        }
        .pocket {
            width: var(--pw); height: var(--ph);
            background: rgba(210,228,255,0.025);
            border: 1px solid rgba(210,228,255,0.11);
            border-radius: 3px;
            position: relative; cursor: pointer; overflow: hidden;
            transition: background 0.14s, border-color 0.14s,
                        transform 0.2s cubic-bezier(0.34,1.5,0.64,1),
                        box-shadow 0.2s ease, z-index 0s;
        }
        .pocket::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 36%;
            background: linear-gradient(180deg,
                rgba(255,255,255,0.065) 0%, rgba(255,255,255,0.016) 55%, transparent 100%);
            pointer-events: none; z-index: 3;
        }
        .pocket::after {
            content: ''; position: absolute;
            top: 0; left: 50%; transform: translateX(-50%);
            width: 28%; height: 3px;
            background: rgba(255,255,255,0.055); border-radius: 0 0 3px 3px;
            z-index: 4;
        }
        .pocket-glare {
            position: absolute; top: 6%; left: 5%; width: 14%; height: 38%;
            background: linear-gradient(135deg, rgba(255,255,255,0.05), transparent);
            pointer-events: none; z-index: 3;
        }
        .pocket-add {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.14s; z-index: 3;
        }
        .pocket-add-icon {
            width: 28px; height: 28px;
            border: 1.5px solid rgba(255,255,255,0.18); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: rgba(255,255,255,0.3); font-size: 16px; line-height: 1;
        }
        .pocket:hover { background: rgba(210,228,255,0.07); border-color: rgba(210,228,255,0.26); }
        .pocket:hover .pocket-add { opacity: 1; }

        /* ── Card image inside pocket ── */
        .pocket-img {
            position: absolute;
            top: 6px; left: 2px; right: 2px; bottom: 0;
            width: calc(100% - 4px); height: calc(100% - 6px);
            object-fit: cover; border-radius: 2px 2px 1px 1px;
            z-index: 1; display: block; pointer-events: none;
        }

        /* binder pocket effect when card is inside */
        .pocket.has-card {
            border-color: rgba(210,228,255,0.28);
            /* inset depth shadow — pocket slot opening casts shadow onto card */
            box-shadow:
                inset 0 5px 10px rgba(0,0,0,0.55),
                inset 1px 0  4px rgba(0,0,0,0.22),
                inset -1px 0 4px rgba(0,0,0,0.22),
                inset 0 -2px 4px rgba(0,0,0,0.15);
        }
        /* stronger top plastic sheen when card is present */
        .pocket.has-card::before {
            height: 45%;
            background: linear-gradient(180deg,
                rgba(255,255,255,0.18) 0%,
                rgba(255,255,255,0.07) 25%,
                rgba(255,255,255,0.02) 60%,
                transparent 100%);
        }
        /* plastic edge highlight at top opening */
        .pocket.has-card::after {
            height: 5px;
            background: linear-gradient(90deg,
                rgba(255,255,255,0.04) 0%,
                rgba(255,255,255,0.18) 40%,
                rgba(255,255,255,0.12) 60%,
                rgba(255,255,255,0.04) 100%);
            width: 80%;
        }

        .pocket-remove {
            position: absolute; top: 8px; right: 5px;
            width: 18px; height: 18px;
            background: rgba(0,0,0,0.72); border: none; border-radius: 50%;
            color: rgba(255,255,255,0.88); font-size: 13px; line-height: 1;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 10;
            opacity: 0; transition: opacity 0.12s;
        }
        .pocket.has-card:hover .pocket-remove { opacity: 1; }
        .pocket.drag-over {
            background: rgba(88,88,255,0.22) !important;
            border-color: rgba(100,100,255,0.7) !important;
            box-shadow: 0 0 0 2px rgba(88,88,255,0.35);
        }
        .pocket.has-card { cursor: zoom-in; }
        .pocket.has-card:hover {
            transform: scale(1.08);
            z-index: 20;
            box-shadow:
                0 10px 30px rgba(0,0,0,0.65),
                0 4px 10px rgba(0,0,0,0.4),
                inset 0 5px 10px rgba(0,0,0,0.55),
                inset 1px 0 4px rgba(0,0,0,0.22),
                inset -1px 0 4px rgba(0,0,0,0.22);
        }

        /* ══ POCKET ADD MENU ══ */
        .pocket-menu {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 6px; opacity: 0; transition: opacity 0.14s; z-index: 3;
        }
        .pocket:hover .pocket-menu { opacity: 1; }
        .pocket-menu-btn {
            display: flex; align-items: center; gap: 5px;
            padding: 4px 9px; border-radius: 12px;
            background: rgba(10,10,20,0.82); border: 1px solid rgba(255,255,255,0.13);
            color: rgba(255,255,255,0.75); font-size: 10.5px; cursor: pointer;
            transition: all 0.12s; white-space: nowrap; user-select: none;
        }
        .pocket-menu-btn:hover { background: rgba(88,88,255,0.4); border-color: rgba(120,120,255,0.5); color: #fff; }

        /* ══ CARD DB MODAL ══ */
        #db-modal {
            display: none; position: fixed; inset: 0; z-index: 1100;
            align-items: center; justify-content: center;
        }
        #db-modal.open { display: flex; }
        #db-backdrop {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(6px);
        }
        #db-box {
            position: relative; z-index: 1;
            background: #0e0e1c; border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px; width: min(980px, 96vw); height: 88vh;
            display: flex; flex-direction: column;
            box-shadow: 0 40px 100px rgba(0,0,0,0.85); overflow: hidden;
        }
        #db-header {
            padding: 15px 20px 13px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex; align-items: center; gap: 12px; flex-shrink: 0;
        }
        #db-title { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.85); flex-shrink: 0; }
        #db-lang-tabs { display: flex; gap: 6px; }
        .db-lang-btn {
            padding: 4px 16px; border-radius: 20px;
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.4); font-size: 12px; font-weight: 600;
            cursor: pointer; transition: all 0.13s; line-height: 1.5;
        }
        .db-lang-btn:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.75); }
        .db-lang-btn.active { background: rgba(88,88,255,0.35); border-color: rgba(110,110,255,0.6); color: #fff; }
        #db-close {
            margin-left: auto; width: 28px; height: 28px; flex-shrink: 0;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50%; color: rgba(255,255,255,0.5); font-size: 14px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        #db-close:hover { background: rgba(255,60,60,0.5); color: #fff; }
        #db-series-row {
            display: flex; gap: 6px; padding: 10px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            flex-shrink: 0; flex-wrap: wrap; align-items: center;
        }
        .db-series-btn {
            padding: 5px 13px; border-radius: 7px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.45); font-size: 11.5px; font-weight: 600;
            cursor: pointer; transition: all 0.12s; white-space: nowrap;
        }
        .db-series-btn:hover { background: rgba(255,255,255,0.09); color: rgba(255,255,255,0.75); }
        .db-series-btn.active { background: rgba(88,88,255,0.3); border-color: rgba(100,100,255,0.5); color: #fff; }
        #db-nav {
            display: none; align-items: center; gap: 8px;
            padding: 8px 20px; border-bottom: 1px solid rgba(255,255,255,0.05);
            flex-shrink: 0;
        }
        #db-nav.visible { display: flex; }
        #db-back {
            padding: 4px 11px; border-radius: 6px; font-size: 11.5px;
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.6); cursor: pointer; transition: all 0.12s; flex-shrink: 0;
        }
        #db-back:hover { background: rgba(255,255,255,0.12); color: #fff; }
        #db-nav-text { font-size: 11.5px; color: rgba(255,255,255,0.4); }
        #db-status {
            padding: 8px 20px 4px; font-size: 11.5px;
            color: rgba(255,255,255,0.28); flex-shrink: 0;
        }
        #db-content { flex: 1; overflow-y: auto; padding: 12px 20px 20px; }
        /* 팩 그리드 */
        .db-pack-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(175px, 1fr)); gap: 10px; }
        .db-pack-item {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px; overflow: hidden; cursor: pointer; transition: all 0.15s;
            display: flex; flex-direction: column;
        }
        .db-pack-item:hover { border-color: rgba(88,88,255,0.5); transform: translateY(-3px);
            box-shadow: 0 8px 28px rgba(0,0,0,0.5); }
        .db-pack-cover-wrap { position: relative; flex-shrink: 0; }
        .db-pack-cover {
            width: 100%; aspect-ratio: 16/9; object-fit: cover;
            background: rgba(255,255,255,0.03); display: block;
        }
        .db-pack-cover-placeholder {
            width: 100%; aspect-ratio: 16/9;
            background: rgba(255,255,255,0.04);
            display: flex; align-items: center; justify-content: center;
            font-size: 28px;
        }
        .db-pack-symbol-badge {
            position: absolute; bottom: 6px; right: 6px;
            width: 34px; height: 34px;
            background: rgba(0,0,0,0.72); border-radius: 50%;
            border: 1.5px solid rgba(255,255,255,0.15);
            padding: 4px; object-fit: contain;
        }
        .db-pack-info { padding: 9px 10px 10px; display: flex; flex-direction: column; gap: 3px; }
        .db-pack-name { font-size: 10.5px; font-weight: 600; color: rgba(255,255,255,0.9); line-height: 1.4; }
        .db-pack-code { font-size: 9.5px; font-weight: 700; color: rgba(140,140,255,0.7); letter-spacing: 0.04em; }
        .db-pack-meta { font-size: 10px; color: rgba(255,255,255,0.32); line-height: 1.5; }
        /* 카드 그리드 */
        .db-card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
        .db-card-item {
            border-radius: 7px; overflow: hidden; cursor: pointer;
            border: 2px solid transparent; transition: all 0.13s;
            aspect-ratio: 63 / 88; background: rgba(255,255,255,0.04); position: relative;
        }
        .db-card-item:hover { border-color: rgba(100,100,255,0.6); transform: scale(1.04); }
        .db-card-item img {
            width: 100%; height: 100%; object-fit: cover; display: block;
            background: linear-gradient(110deg, #1a1a2e 30%, #23234a 50%, #1a1a2e 70%);
            background-size: 200% 100%;
            animation: db-shimmer 1.4s infinite;
        }
        .db-card-item img[src] { animation: none; background: none; }
        @keyframes db-shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
        .db-card-label {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.75); font-size: 8.5px; color: rgba(255,255,255,0.85);
            padding: 3px 4px; text-align: center; opacity: 0; transition: opacity 0.12s;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .db-card-item:hover .db-card-label { opacity: 1; }
        .db-card-rarity {
            position: absolute; top: 5px; right: 5px;
            font-size: 8px; font-weight: 700; letter-spacing: 0.04em;
            background: rgba(0,0,0,0.72); border: 1px solid;
            border-radius: 4px; padding: 1px 5px; line-height: 1.5;
            opacity: 0; transition: opacity 0.12s;
        }
        .db-card-item:hover .db-card-rarity { opacity: 1; }
        /* DB 카드 → 바인더에 추가 버튼 */
        .db-add-btn {
            position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
            background: rgba(60,180,100,0.85); border: 1px solid rgba(80,220,120,0.7);
            color: #fff; border-radius: 5px; padding: 3px 10px;
            font-size: 10px; font-weight: 700; cursor: pointer; font-family: inherit;
            white-space: nowrap; opacity: 0; transition: opacity 0.12s;
            pointer-events: none; z-index: 2;
        }
        .db-card-item:hover .db-add-btn { opacity: 1; pointer-events: auto; }
        .db-add-btn:hover { background: rgba(60,220,100,0.95); }
        /* 슬롯 선택 오버레이 */
        #slot-pick-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 9000;
            background: rgba(40,180,100,0.18); border-bottom: 2px solid rgba(80,220,120,0.6);
            padding: 10px 20px; align-items: center; justify-content: center; gap: 14px;
            font-size: 13px; color: #a0ffcc; font-weight: 600;
        }
        #slot-pick-overlay.show { display: flex; }
        #slot-pick-cancel-btn {
            background: rgba(255,80,80,0.22); border: 1px solid rgba(255,80,80,0.45);
            color: #ff9090; border-radius: 6px; padding: 3px 12px;
            font-size: 11px; cursor: pointer; font-family: inherit;
        }
        #slot-pick-cancel-btn:hover { background: rgba(255,80,80,0.45); color: #fff; }
        body.slot-pick-mode .pocket:not(.has-card) {
            outline: 2px dashed rgba(80,220,120,0.6); cursor: crosshair;
        }
        body.slot-pick-mode .pocket:not(.has-card):hover {
            outline-color: rgba(80,255,140,1); background: rgba(60,200,100,0.12);
        }
        /* 사이드바 DB 버튼 */
        .sidebar-db-btn {
            margin: 0 6px 6px; padding: 9px 12px;
            background: rgba(88,88,255,0.1); border: 1px solid rgba(88,88,255,0.22);
            border-radius: 8px; color: rgba(180,180,255,0.65); font-size: 12px; font-weight: 500;
            cursor: pointer; transition: all 0.13s; text-align: left;
            display: flex; align-items: center; gap: 8px;
            width: calc(100% - 12px); font-family: inherit;
        }
        .sidebar-db-btn:hover { background: rgba(88,88,255,0.22); border-color: rgba(88,88,255,0.45); color: #fff; }

        /* ══ CARD MODAL ══ */
        #card-modal {
            display: none;
            position: fixed; inset: 0; z-index: 1200; /* DB 모달(1100) 위에 */
            align-items: center; justify-content: center;
        }
        #card-modal.open { display: flex; }
        #card-modal-backdrop {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(8px);
            opacity: 0; transition: opacity 200ms ease;
        }
        #card-modal.open #card-modal-backdrop { opacity: 1; }
        #card-modal-img-wrap {
            position: relative; z-index: 1;
            transform: scale(0.88); opacity: 0;
            transition: transform 240ms cubic-bezier(0.34,1.4,0.64,1), opacity 200ms ease;
            display: flex; align-items: center; gap: 32px;
        }
        #card-modal.open #card-modal-img-wrap { transform: scale(1); opacity: 1; }

        #card-modal-img-box {
            position: relative;
            z-index: 1;
        }
        #card-modal-img {
            display: block;
            max-width: min(440px, 75vw);
            max-height: 86vh;
            width: auto; height: auto;
            border-radius: 12px;
            transition: width 0.12s ease, opacity 0.1s ease;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.1),
                0 40px 100px rgba(0,0,0,0.9),
                0 10px 30px rgba(0,0,0,0.7);
            user-select: none; pointer-events: none;
        }
        #card-modal-close {
            position: absolute; top: -14px; right: -14px;
            width: 30px; height: 30px;
            background: rgba(20,20,30,0.95); border: 1px solid rgba(255,255,255,0.15);
            border-radius: 50%; color: rgba(255,255,255,0.7); font-size: 13px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.14s; z-index: 2;
        }
        #card-modal-close:hover { background: rgba(220,50,50,0.9); color: #fff; border-color: transparent; }

        #card-modal-counter {
            position: absolute; bottom: -28px; left: 50%; transform: translateX(-50%);
            font-size: 11px; color: rgba(255,255,255,0.3); white-space: nowrap;
            user-select: none; letter-spacing: 0.04em;
        }

        .modal-nav {
            width: 48px; height: 48px; flex-shrink: 0;
            background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
            border-radius: 50%; color: rgba(255,255,255,0.6); font-size: 24px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.14s; user-select: none;
            position: relative; z-index: 20;
        }
        .modal-nav:hover { background: rgba(255,255,255,0.16); color: #fff; border-color: rgba(255,255,255,0.3); transform: scale(1.08); }
        .modal-nav:disabled { opacity: 0.12; cursor: default; pointer-events: none; transform: none; }

        /* ══ PAGE NAV ══ */
        .page-nav { display: flex; align-items: center; gap: 14px; }
        .nav-arrow {
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 50%; color: rgba(255,255,255,0.42); font-size: 18px;
            cursor: pointer; transition: all 0.14s; user-select: none;
        }
        .nav-arrow:hover { background: rgba(255,255,255,0.09); color: #fff; border-color: rgba(255,255,255,0.16); }
        .nav-arrow:disabled { opacity: 0.16; cursor: default; pointer-events: none; }

        .dots-wrap { display: flex; align-items: center; gap: 4px; flex-wrap: nowrap; }
        /* 숫자 페이지 버튼 */
        .pg-num {
            min-width: 26px; height: 26px; padding: 0 7px;
            border-radius: 6px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.09);
            color: rgba(255,255,255,0.42); font-size: 11.5px; font-weight: 500;
            cursor: pointer; transition: all 0.13s; user-select: none;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .pg-num:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.85); border-color: rgba(255,255,255,0.2); }
        .pg-num.active {
            background: rgba(88,88,255,0.22); border-color: rgba(88,88,255,0.55);
            color: #a0a0ff; font-weight: 700;
            box-shadow: 0 0 8px rgba(88,88,255,0.3);
        }
        .pg-ellipsis { font-size: 12px; color: rgba(255,255,255,0.22); padding: 0 2px; user-select: none; line-height: 26px; }

        .pg-add-btn {
            width: 22px; height: 22px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 5px; color: rgba(255,255,255,0.3); font-size: 13px;
            cursor: pointer; transition: all 0.12s; user-select: none;
        }
        .pg-add-btn:hover { background: rgba(255,255,255,0.09); color: rgba(255,255,255,0.8); }
        .pg-add-btn:disabled { opacity: 0.15; cursor: default; pointer-events: none; }

        /* hidden color picker */
        #color-picker { display: none; }

        /* ══ AUTH MODAL ══ */
        .auth-overlay {
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(0,0,0,0.75);
            display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(4px);
        }
        .auth-overlay.open { display: flex; }
        .auth-box {
            background: #13132a;
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 16px; padding: 30px 28px; width: 340px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.6);
        }
        .auth-box h2 { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
        .auth-box .auth-sub { font-size: 12px; color: rgba(255,255,255,0.3); margin-bottom: 20px; }
        .auth-inp {
            width: 100%; background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 8px; color: #fff; padding: 10px 13px;
            font-size: 13px; margin-bottom: 10px; outline: none; font-family: inherit;
        }
        .auth-inp:focus { border-color: rgba(88,88,255,0.55); background: rgba(255,255,255,0.08); }
        .auth-btn-main {
            width: 100%; background: #5858ff; border: none;
            border-radius: 8px; color: #fff; padding: 11px;
            font-size: 13px; font-weight: 600; cursor: pointer;
            transition: background 0.15s; margin-top: 4px;
        }
        .auth-btn-main:hover { background: #7070ff; }
        .auth-btn-main:disabled { opacity: 0.5; cursor: default; }
        .auth-err { color: #ff8080; font-size: 12px; margin-bottom: 8px; min-height: 16px; }
        .auth-sep { border: none; border-top: 1px solid rgba(255,255,255,0.07); margin: 16px 0; }
        .auth-toggle { text-align: center; font-size: 12px; color: rgba(255,255,255,0.35); }
        .auth-toggle a { color: #9090ff; cursor: pointer; text-decoration: underline; }
        .auth-cancel { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.09); border-radius: 8px; color: rgba(255,255,255,0.4); padding: 9px; font-size: 12px; cursor: pointer; margin-top: 8px; transition: all 0.12s; }
        .auth-cancel:hover { background: rgba(255,255,255,0.09); color: rgba(255,255,255,0.7); }

        /* 로그인된 사용자 이름 표시 */
        .login-user { font-size: 11px; color: rgba(255,255,255,0.55); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100px; }

        /* ══ PAGE FLAG TABS (포스트잇 북마크 탭) ══ */
        /*
         * 실제 포스트잇 탭처럼 바인더 오른쪽 엣지 밖으로 삐져나오는 직사각형 탭
         * - right: -42px → 탭 52px 중 10px만 바인더 안쪽에 걸치고 42px 바깥 돌출
         * - translateY(-50%) → 계산된 % 위치를 기준으로 수직 중앙 정렬
         * - overflow: visible on .sticker-layer → 부모 밖으로 삐져나오게 허용
         */
        .sticker-layer {
            position: absolute; inset: 0;
            pointer-events: none; z-index: 15;
            overflow: visible;
        }

        /* 채워진 탭 */
        .page-tab {
            position: absolute;
            right: -42px;          /* 10px 안쪽 고정 + 42px 바깥 돌출 */
            width: 52px; height: 28px;
            border-radius: 0 5px 5px 0;        /* 왼쪽 완전 직각, 오른쪽만 살짝 둥글게 */
            cursor: pointer; pointer-events: all;
            box-shadow: 3px 1px 8px rgba(0,0,0,0.6),
                        inset 0 1px 0 rgba(255,255,255,0.2);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            opacity: 0.9;
            transform: translateY(-50%);
            display: flex; align-items: center; justify-content: center;
            padding: 0 5px 0 2px;
            overflow: hidden;
        }
        .page-tab:hover {
            transform: translateY(-50%) translateX(6px);
            opacity: 1;
            box-shadow: 5px 2px 14px rgba(0,0,0,0.65),
                        inset 0 1px 0 rgba(255,255,255,0.28);
            z-index: 20;
        }
        .page-tab.active {
            transform: translateY(-50%) translateX(8px);
            opacity: 1; height: 32px;
            box-shadow: 5px 2px 16px rgba(0,0,0,0.7),
                        inset 0 1px 0 rgba(255,255,255,0.32);
            z-index: 20;
        }

        /* 탭 안의 가로 텍스트 */
        .tab-label {
            font-size: 9px; font-weight: 700;
            color: rgba(255,255,255,0.95);
            line-height: 1; overflow: hidden;
            max-width: 42px;
            white-space: nowrap; text-overflow: ellipsis;
            text-shadow: 0 1px 3px rgba(0,0,0,0.55);
            pointer-events: none;
            text-align: center; letter-spacing: 0.01em;
        }

        /* 탭 삭제 버튼 (hover 시 나타남) */
        .tab-del {
            position: absolute; top: -5px; right: 1px;
            width: 14px; height: 14px;
            background: rgba(15,15,25,0.92); border: none; border-radius: 50%;
            color: rgba(255,255,255,0.8); font-size: 12px; line-height: 1;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; pointer-events: all;
            opacity: 0; transition: opacity 0.12s, background 0.12s;
        }
        .page-tab:hover .tab-del { opacity: 1; }
        .tab-del:hover { background: rgba(200,55,55,0.95); }

        /* + 탭 (현재 페이지, 스티커 없음) */
        .tab-add {
            position: absolute;
            right: -42px; width: 52px; height: 28px;
            border-radius: 0 5px 5px 0;
            cursor: pointer; pointer-events: all;
            background: rgba(255,255,255,0.04);
            border: 1.5px dashed rgba(255,255,255,0.25);
            color: rgba(255,255,255,0.45); font-size: 15px; line-height: 1;
            display: flex; align-items: center; justify-content: center;
            transform: translateY(-50%);
            opacity: 0;
            transition: opacity 0.16s,
                        transform 0.18s cubic-bezier(0.34,1.4,0.64,1),
                        background 0.14s;
        }
        .binder-outer:hover .tab-add { opacity: 0.75; }
        .tab-add:hover {
            transform: translateY(-50%) translateX(6px);
            opacity: 1;
            color: rgba(255,255,255,0.85);
            background: rgba(255,255,255,0.09);
            border-color: rgba(255,255,255,0.5);
        }

        /* 스티커 편집 팝업 */
        .sticker-popup {
            position: absolute;
            right: 22px;           /* 탭 왼쪽에 붙음 */
            pointer-events: all; z-index: 50;
            background: #1c1c32; border: 1px solid rgba(255,255,255,0.13);
            border-radius: 11px; padding: 11px 13px;
            box-shadow: -4px 4px 28px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04);
            min-width: 168px;
        }
        .sticker-swatches { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 9px; }
        .sticker-swatch {
            width: 18px; height: 18px; border-radius: 50%; cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.12s, border-color 0.12s; flex-shrink: 0;
        }
        .sticker-swatch:hover { transform: scale(1.28); }
        .sticker-swatch.sel { border-color: #fff; transform: scale(1.15); }
        .sticker-popup-inp {
            width: 100%; background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.14); border-radius: 7px;
            color: #fff; padding: 7px 9px; font-size: 12px; outline: none;
            font-family: inherit; margin-bottom: 9px; display: block; box-sizing: border-box;
        }
        .sticker-popup-inp:focus { border-color: rgba(88,88,255,0.55); }
        .sticker-popup-btns { display: flex; gap: 6px; }
        .sticker-ok { flex:1; padding:6px; font-size:11.5px; background:#5858ff; border:none; border-radius:7px; color:#fff; cursor:pointer; font-weight:600; }
        .sticker-ok:hover { background:#7070ff; }
        .sticker-cx { flex:1; padding:6px; font-size:11.5px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:7px; color:rgba(255,255,255,0.45); cursor:pointer; }
        .sticker-cx:hover { color:rgba(255,255,255,0.75); }
    </style>
</head>
<body>
<input type="color" id="color-picker">

<!-- ══ SIDEBAR ══ -->
<aside class="sidebar">
    <div class="sidebar-logo">
        <div class="logo-icon">🃏</div>
        <span class="logo-text">PokéBinder</span>
    </div>
    <div class="sidebar-label">내 바인더</div>
    <div class="binder-list" id="binder-list"></div>
    <div class="sidebar-add" id="btn-add-binder">
        <span style="font-size:13px;">＋</span> 새 바인더
    </div>
    <div style="border-top:1px solid rgba(255,255,255,0.05);margin-top:6px;padding-top:8px;">
        <div class="sidebar-label" style="padding-top:6px;">카드 데이터</div>
        <button class="sidebar-db-btn" id="btn-card-db">🗃️ 카드 DB 브라우저</button>
    </div>
    <div class="sidebar-footer">
        <div class="avatar">?</div>
        <span class="login-hint">로그인하세요</span>
        <button class="login-btn-sm">로그인</button>
    </div>
</aside>

<!-- ══ MAIN ══ -->
<div class="main">
    <div class="topbar">
        <span class="tb-title" id="tb-title"></span>
        <span class="tb-badge" id="tb-badge" title="클릭해서 변경"></span>
        <span class="tb-count" id="tb-count"></span>
        <div class="topbar-right">
            <button class="sz-btn" id="sz-dn">−</button>
            <span class="sz-lbl" id="sz-lbl">100%</span>
            <button class="sz-btn" id="sz-up">+</button>
            <button class="sz-btn" id="sz-fit" title="화면에 맞춤" style="font-size:12px;">⊡</button>
        </div>
    </div>

    <div class="stage">
        <div class="binder-glow">
            <div class="binder-persp">
                <div class="binder-outer">
                    <!-- LEFT ZONE -->
                    <div class="zone" id="zone-L">
                        <div id="left-bg" class="binder-page left">
                            <div class="page-surface"><div class="pocket-grid" id="left-bg-grid"></div></div>
                            <div class="page-stack"></div>
                            <div class="pg-shadow" id="shadow-L"></div>
                        </div>
                        <div class="flipper" id="flipper-L">
                            <div class="flip-face binder-page left" id="flip-L-front">
                                <div class="page-surface"><div class="pocket-grid" id="flip-L-front-grid"></div></div>
                            </div>
                            <div class="flip-face binder-page right" id="flip-L-back">
                                <div class="page-surface"><div class="pocket-grid" id="flip-L-back-grid"></div></div>
                            </div>
                        </div>
                    </div>
                    <!-- SPINE -->
                    <div class="spine"></div>
                    <!-- RIGHT ZONE -->
                    <div class="zone" id="zone-R">
                        <div id="right-bg" class="binder-page right">
                            <div class="page-surface"><div class="pocket-grid" id="right-bg-grid"></div></div>
                            <div class="page-stack"></div>
                            <div class="pg-shadow" id="shadow-R"></div>
                        </div>
                        <div class="flipper" id="flipper-R">
                            <div class="flip-face binder-page right" id="flip-R-front">
                                <div class="page-surface"><div class="pocket-grid" id="flip-R-front-grid"></div></div>
                            </div>
                            <div class="flip-face binder-page left" id="flip-R-back">
                                <div class="page-surface"><div class="pocket-grid" id="flip-R-back-grid"></div></div>
                            </div>
                        </div>
                    </div>
                    <!-- Sticker layer: absolute over binder-outer, not inside any zone -->
                    <div class="sticker-layer" id="sticker-layer"></div>
                </div>
            </div>
        </div>

        <!-- Page nav -->
        <div class="page-nav">
            <button class="nav-arrow" id="btn-prev">&#8249;</button>
            <div class="dots-wrap" id="dots"></div>
            <button class="nav-arrow" id="btn-next">&#8250;</button>
            <div style="width:1px;height:16px;background:rgba(255,255,255,0.08);margin:0 2px;"></div>
            <button class="pg-add-btn" id="pg-remove" title="페이지 삭제">−</button>
            <button class="pg-add-btn" id="pg-add" title="페이지 추가">＋</button>
        </div>
    </div>
</div>

<!-- Card DB Modal -->
<div id="db-modal">
    <div id="db-backdrop"></div>
    <div id="db-box">
        <div id="db-header">
            <span id="db-title">🗃️ 카드 DB</span>
            <div id="db-lang-tabs">

<script>
/* ══════════════════════════════════════

══════════════════════════════════════ */
const SUPABASE_URL = 'https://hapwcijsjqqcozfgmfdg.supabase.co';

/* ══════════════════════════════════════
   DATA
══════════════════════════════════════ */
let nextId = 4;
const BINDERS = [
    { id: 1, name: '스칼렛 & 바이올렛', color: '#6060ff', pages: 5, type: '9포켓' },
    { id: 2, name: '소드 & 실드',       color: '#40b080', pages: 4, type: '9포켓' },
    { id: 3, name: '탑로더 컬렉션',     color: '#e06040', pages: 3, type: '탑로더' },
];
let activeBinder = BINDERS[0];
let page     = 1;
let flipping = false;
const DURATION = 650;

const stickerData = {};  // key: `${binderId}_${page}` → { text, color }
const STICKER_COLORS = ['#e04f4f','#e07d25','#c4a820','#35a05a','#3d8ee0','#7248cc','#d04898','#28aaaa'];

/* ══════════════════════════════════════
   SIZE
══════════════════════════════════════ */
const PW_STEPS  = [60, 72, 84, 96, 110, 125, 140, 158, 178, 200, 226];
const SZ_LABELS = ['57%','69%','80%','91%','105%','119%','133%','150%','169%','190%','215%'];
let szIdx = 4;

function applySize() {
    document.documentElement.style.setProperty('--pw', PW_STEPS[szIdx] + 'px');
    document.getElementById('sz-lbl').textContent = SZ_LABELS[szIdx];
    document.getElementById('sz-dn').disabled = szIdx === 0;
    document.getElementById('sz-up').disabled = szIdx === PW_STEPS.length - 1;
}
document.getElementById('sz-up').addEventListener('click', () => { if (szIdx < PW_STEPS.length-1){ szIdx++; applySize(); }});
document.getElementById('sz-dn').addEventListener('click', () => { if (szIdx > 0){ szIdx--; applySize(); }});

/* ── auto-fit: fills the visible stage as large as possible ── */
function autoFit() {
    const stage   = document.querySelector('.stage');
    const nav     = document.querySelector('.page-nav');
    const gap     = 9, pp = 16, spine = 26;
    const sw      = stage.clientWidth  - 40;                 // stage padding
    const sh      = stage.clientHeight - (nav ? nav.offsetHeight + 28 : 80) - 40;
    const pwW     = Math.floor((sw - 2*(2*gap + 2*pp) - spine) / 6);   // 6 pockets wide
    const pwH     = Math.floor(sh * 63 / 88 - 2*pp);                    // height → pw
    const fit     = Math.min(pwW, pwH, PW_STEPS[PW_STEPS.length - 1]);
    const clamped = Math.max(PW_STEPS[0], fit);
    document.documentElement.style.setProperty('--pw', clamped + 'px');
    // snap label to nearest step
    szIdx = PW_STEPS.reduce((b, v, i) => Math.abs(v - clamped) < Math.abs(PW_STEPS[b] - clamped) ? i : b, 0);
    document.getElementById('sz-lbl').textContent = SZ_LABELS[szIdx];
    document.getElementById('sz-dn').disabled = szIdx === 0;
    document.getElementById('sz-up').disabled = szIdx === PW_STEPS.length - 1;
}
document.getElementById('sz-fit').addEventListener('click', autoFit);

/* ══════════════════════════════════════
   CARD DATA STORE
══════════════════════════════════════ */
const cardData = {};  // key: `${binderId}_${sp}_${side}` → Array(9) of dataURL|null

function getCards(binderId, sp, side) {
    const key = `${binderId}_${sp}_${side}`;
    if (!cardData[key]) cardData[key] = Array(9).fill(null);
    return cardData[key];
}

/* ══════════════════════════════════════
   FILE INPUT
══════════════════════════════════════ */
const fileInput = document.createElement('input');
fileInput.type = 'file'; fileInput.accept = 'image/*';
fileInput.multiple = true; fileInput.style.display = 'none';
document.body.appendChild(fileInput);
let pendingSlot   = null;
let pendingDbCard = null; // DB에서 선택한 카드 URL — 슬롯 클릭 대기 중

function enterSlotPickMode(url) {
    pendingDbCard = url;
    document.body.classList.add('slot-pick-mode');
    document.getElementById('slot-pick-overlay').classList.add('show');
    closeDbModal();
}

function exitSlotPickMode() {
    pendingDbCard = null;
    document.body.classList.remove('slot-pick-mode');
    document.getElementById('slot-pick-overlay').classList.remove('show');
}

document.getElementById('slot-pick-cancel-btn').addEventListener('click', exitSlotPickMode);
document.addEventListener('keydown', e => { if (e.key === 'Escape' && pendingDbCard) exitSlotPickMode(); });

function openFilePicker(binderId, sp, side, idx) {
    pendingSlot = { binderId, sp, side, idx };
    fileInput.value = '';
    fileInput.click();
}
fileInput.addEventListener('change', () => {
    if (fileInput.files.length && pendingSlot) {
        loadImgMulti(fileInput.files, pendingSlot.binderId,
                     pendingSlot.sp, pendingSlot.side, pendingSlot.idx);
    }
    pendingSlot = null;
});

/* 클릭한 슬롯부터 순서대로 채울 슬롯 목록 생성 */
function getBinderConfig(type) {
    if (type === '12포켓') return { cols: 4, count: 12, gridClass: 'grid-12' };
    if (type === '탑로더') return { cols: 3, count: 9,  gridClass: 'grid-tl' };
    return                        { cols: 3, count: 9,  gridClass: '' };
}

function buildSlots(startSp, startSide, startIdx, count) {
    const cfg   = getBinderConfig(activeBinder.type);
    const slots = [];
    let sp = startSp, side = startSide, idx = startIdx;
    while (slots.length < count && sp <= activeBinder.pages) {
        slots.push({ sp, side, idx });
        if (++idx >= cfg.count) {
            idx = 0;
            side = (side === 'L') ? 'R' : 'L';
            if (side === 'L') sp++;
        }
    }
    return slots;
}

/* 여러 파일을 순서대로 슬롯에 채움 */
function loadImgMulti(files, binderId, sp, side, startIdx) {
    const imgFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
    if (!imgFiles.length) return;
    const slots   = buildSlots(sp, side, startIdx, imgFiles.length);
    let   loaded  = 0;
    const total   = Math.min(imgFiles.length, slots.length);

    imgFiles.slice(0, total).forEach((file, i) => {
        const reader = new FileReader();
        reader.onload = e => {
            const s = slots[i];
            getCards(binderId, s.sp, s.side)[s.idx] = e.target.result;
            if (++loaded === total) { refreshSpread(); saveToLocalStorage(); }
            if (typeof sbSaveCard === 'function') sbSaveCard(binderId, s.sp, s.side, s.idx, e.target.result);
        };
        reader.readAsDataURL(file);
    });
}

/* prevent browser from opening dropped images globally */
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop',     e => e.preventDefault());

/* ══════════════════════════════════════
   POCKET HTML
══════════════════════════════════════ */
function makePocket(binderId, sp, side, idx) {
    const src = getCards(binderId, sp, side)[idx];
    if (src) {
        return `<div class="pocket has-card" data-sp="${sp}" data-side="${side}" data-idx="${idx}">
            <img src="${src}" class="pocket-img" draggable="false">
            <button class="pocket-remove" title="카드 제거">×</button>
            <div class="pocket-glare"></div>
        </div>`;
    }
    return `<div class="pocket" data-sp="${sp}" data-side="${side}" data-idx="${idx}">
        <div class="pocket-glare"></div>
        <div class="pocket-menu">
            <button class="pocket-menu-btn pocket-upload-btn">📁 파일</button>
        </div>
    </div>`;
}

function fillPage(gridId, sp, side) {
    const grid = document.getElementById(gridId);
    if (!grid) return;
    const cfg = getBinderConfig(activeBinder.type);
    // 타입별 grid 클래스 적용
    grid.className = 'pocket-grid' + (cfg.gridClass ? ' ' + cfg.gridClass : '');
    grid.innerHTML = Array.from({ length: cfg.count }, (_, i) =>
        makePocket(activeBinder.id, sp, side, i)
    ).join('');

    grid.querySelectorAll('.pocket').forEach(pocket => {
        const idx  = +pocket.dataset.idx;
        const pSp  = +pocket.dataset.sp;
        const pSide = pocket.dataset.side;

        /* drag & drop */
        pocket.addEventListener('dragover', e => {
            e.preventDefault(); e.stopPropagation();
            pocket.classList.add('drag-over');
        });
        pocket.addEventListener('dragleave', () => pocket.classList.remove('drag-over'));
        pocket.addEventListener('drop', e => {
            e.preventDefault(); e.stopPropagation();
            pocket.classList.remove('drag-over');
            const files = e.dataTransfer.files;
            if (files.length)
                loadImgMulti(files, activeBinder.id, pSp, pSide, idx);
        });

        /* 📁 파일 업로드 */
        const uploadBtn = pocket.querySelector('.pocket-upload-btn');
        if (uploadBtn) uploadBtn.addEventListener('click', e => {
            e.stopPropagation();
            openFilePicker(activeBinder.id, pSp, pSide, idx);
        });
        /* 슬롯 선택 모드: 빈 슬롯 클릭 시 pendingDbCard 삽입 */
        if (!pocket.classList.contains('has-card')) {
            pocket.addEventListener('click', e => {
                if (!pendingDbCard) return;
                if (e.target.closest('.pocket-menu')) return;
                getCards(activeBinder.id, pSp, pSide)[idx] = pendingDbCard;
                saveToLocalStorage();
                if (typeof sbSaveCard === 'function') sbSaveCard(activeBinder.id, pSp, pSide, idx, pendingDbCard);
                refreshSpread();
                exitSlotPickMode();
            });
        }
        /* × remove */
        const removeBtn = pocket.querySelector('.pocket-remove');
        if (removeBtn) removeBtn.addEventListener('click', e => {
            e.stopPropagation();
            getCards(activeBinder.id, pSp, pSide)[idx] = null;
            refreshSpread();
            saveToLocalStorage();
            if (typeof sbDeleteCard === 'function') sbDeleteCard(activeBinder.id, pSp, pSide, idx);
        });

        /* left-click on card → zoom modal */
        if (pocket.classList.contains('has-card')) {
            pocket.addEventListener('click', e => {
                if (e.target.closest('.pocket-remove')) return;
                const src = getCards(activeBinder.id, pSp, pSide)[idx];
                if (src) openCardModal(src, pSp, pSide, idx);
            });
        }
    });
}

function refreshSpread() {
    fillPage('left-bg-grid',      page, 'L');
    fillPage('right-bg-grid',     page, 'R');
    fillPage('flip-R-front-grid', page, 'R');
    fillPage('flip-L-front-grid', page, 'L');
    updateTopbar();
}

/* legacy shim — kept so nothing else breaks */
function fill(id) { fillPage(id, page, 'L'); }

/* ══════════════════════════════════════
   INLINE EDIT  (generic)
══════════════════════════════════════ */
function inlineEdit(el, onSave) {
    const original = el.textContent.trim();
    const input = document.createElement('input');
    input.className = 'inline-edit';
    input.value = original;
    input.style.width = Math.max(original.length * 9 + 20, 80) + 'px';
    el.replaceWith(input);
    input.focus(); input.select();

    const save = () => {
        const val = input.value.trim() || original;
        el.textContent = val;
        input.replaceWith(el);
        onSave(val);
    };
    input.addEventListener('blur', save);
    input.addEventListener('keydown', e => {
        if (e.key === 'Enter')  { e.preventDefault(); save(); }
        if (e.key === 'Escape') { input.value = original; save(); }
    });
}

/* ══════════════════════════════════════
   SIDEBAR
══════════════════════════════════════ */
function renderSidebar() {
    const list = document.getElementById('binder-list');
    list.innerHTML = BINDERS.map(b => `
        <div class="binder-item${b.id === activeBinder.id ? ' active' : ''}" data-id="${b.id}">
            <div class="b-dot" style="background:${b.color};" data-id="${b.id}" title="색상 변경"></div>
            <span class="b-name" data-id="${b.id}">${b.name}</span>
            <button class="b-del" data-id="${b.id}" title="바인더 삭제">×</button>
        </div>`).join('');

    /* click row → switch */
    list.querySelectorAll('.binder-item').forEach(el =>
        el.addEventListener('click', e => {
            if (e.target.classList.contains('b-dot') ||
                e.target.classList.contains('b-del') ||
                e.target.classList.contains('b-name')) return;
            switchBinder(+el.dataset.id);
        })
    );

    /* dblclick name → edit */
    list.querySelectorAll('.b-name').forEach(el =>
        el.addEventListener('dblclick', e => {
            e.stopPropagation();
            const b = BINDERS.find(x => x.id === +el.dataset.id);
            inlineEdit(el, val => {
                b.name = val;
                if (activeBinder.id === b.id) updateTopbar();
                renderSidebar();
                if (typeof sbSaveBinder === 'function') sbSaveBinder(b);
                saveToLocalStorage();
            });
        })
    );

    /* click dot → color picker */
    list.querySelectorAll('.b-dot').forEach(dot =>
        dot.addEventListener('click', e => {
            e.stopPropagation();
            const b = BINDERS.find(x => x.id === +dot.dataset.id);
            const picker = document.getElementById('color-picker');
            picker.value = b.color;
            picker.onchange = ev => {
                b.color = ev.target.value;
                renderSidebar();
                if (typeof sbSaveBinder === 'function') sbSaveBinder(b);
                saveToLocalStorage();
            };
            picker.click();
        })
    );

    /* delete */
    list.querySelectorAll('.b-del').forEach(btn =>
        btn.addEventListener('click', e => {
            e.stopPropagation();
            const id = +btn.dataset.id;
            if (BINDERS.length <= 1) return;
            const idx = BINDERS.findIndex(x => x.id === id);
            BINDERS.splice(idx, 1);
            if (activeBinder.id === id) {
                activeBinder = BINDERS[Math.min(idx, BINDERS.length-1)];
                page = 1;
                updateTopbar();
                renderDots();
                updateUI();
                initFill();
                renderSticker();
            }
            renderSidebar();
            if (typeof sbDeleteBinder === 'function') sbDeleteBinder(id);
            saveToLocalStorage();
        })
    );
}

function switchBinder(id) {
    const b = BINDERS.find(x => x.id === id);
    if (!b || b.id === activeBinder.id) return;
    activeBinder = b;
    page = 1;
    updateTopbar();
    renderSidebar();
    renderDots();
    updateUI();
    initFill();
    renderSticker();
}

/* ══════════════════════════════════════
   TOPBAR
══════════════════════════════════════ */
const TYPES = ['9포켓', '12포켓', '탑로더'];

function countFilledCards() {
    let n = 0;
    for (let sp = 1; sp <= activeBinder.pages; sp++)
        for (const side of ['L', 'R'])
            n += getCards(activeBinder.id, sp, side).filter(Boolean).length;
    return n;
}

function updateTopbar() {
    document.getElementById('tb-title').textContent = activeBinder.name;
    document.getElementById('tb-badge').textContent = activeBinder.type;
    const cfg   = getBinderConfig(activeBinder.type);
    const total = activeBinder.pages * cfg.count * 2;
    document.getElementById('tb-count').textContent = `${countFilledCards()} / ${total} 카드`;
}

/* title dblclick → edit */
document.getElementById('tb-title').addEventListener('dblclick', function() {
    inlineEdit(this, val => {
        activeBinder.name = val;
        renderSidebar();
        if (typeof sbSaveBinder === 'function') sbSaveBinder(activeBinder);
        saveToLocalStorage();
    });
});

/* badge click → cycle type */
document.getElementById('tb-badge').addEventListener('click', () => {
    const idx = TYPES.indexOf(activeBinder.type);
    activeBinder.type = TYPES[(idx + 1) % TYPES.length];
    document.getElementById('tb-badge').textContent = activeBinder.type;
    renderSidebar();
    initFill();
    updateTopbar();
    if (typeof sbSaveBinder === 'function') sbSaveBinder(activeBinder);
    saveToLocalStorage();
});

/* ══════════════════════════════════════
   DOTS + PAGE MANAGEMENT
══════════════════════════════════════ */
function renderDots() {
    const total     = activeBinder.pages;
    const container = document.getElementById('dots');

    /* 숫자 버튼 생성 — 페이지가 많으면 스마트 윈도우 (1 … 3 4[5]6 7 … 10) */
    const show = new Set();
    if (total <= 9) {
        for (let i = 1; i <= total; i++) show.add(i);
    } else {
        show.add(1); show.add(total);
        for (let i = Math.max(1, page - 2); i <= Math.min(total, page + 2); i++) show.add(i);
    }
    const sorted = [...show].sort((a, b) => a - b);
    let html = ''; let prev = 0;
    for (const p of sorted) {
        if (p - prev > 1) html += `<span class="pg-ellipsis">…</span>`;
        html += `<button class="pg-num${p === page ? ' active' : ''}" data-p="${p}">${p}</button>`;
        prev = p;
    }
    container.innerHTML = html;

    container.querySelectorAll('.pg-num').forEach(btn =>
        btn.addEventListener('click', () => {
            const t = +btn.dataset.p;
            if (t !== page && !flipping) jumpTo(t);
        })
    );

    document.getElementById('pg-remove').disabled = total <= 1;
    document.getElementById('pg-add').disabled    = total >= 20;
    updatePageIndicator(); // page-indicator 없으면 no-op
}

document.getElementById('pg-add').addEventListener('click', () => {
    if (activeBinder.pages >= 20) return;
    activeBinder.pages++;
    renderDots();
    updateUI();
    updateTopbar();
    if (typeof sbSaveBinder === 'function') sbSaveBinder(activeBinder);
    saveToLocalStorage();
});
document.getElementById('pg-remove').addEventListener('click', () => {
    if (activeBinder.pages <= 1) return;
    if (page > activeBinder.pages - 1) {
        page = activeBinder.pages - 1;
        initFill();
        renderSticker();
    }
    activeBinder.pages--;
    renderDots();
    updateUI();
    updateTopbar();
    if (typeof sbSaveBinder === 'function') sbSaveBinder(activeBinder);
    saveToLocalStorage();
});

/* ══════════════════════════════════════
   NEW BINDER
══════════════════════════════════════ */
document.getElementById('btn-add-binder').addEventListener('click', () => {
    const colors = ['#6060ff','#40b080','#e06040','#e0a030','#60b0e0','#c060c0'];
    const newB = {
        id: nextId++,
        name: '새 바인더',
        color: colors[BINDERS.length % colors.length],
        pages: 3,
        type: '9포켓'
    };
    BINDERS.push(newB);
    renderSidebar();
    switchBinder(newB.id);
    /* Supabase 저장 */
    if (typeof sbSaveBinder === 'function') sbSaveBinder(newB);
    saveToLocalStorage();

    /* immediately edit the name in sidebar */
    setTimeout(() => {
        const nameEl = document.querySelector(`.b-name[data-id="${newB.id}"]`);
        if (nameEl) nameEl.dispatchEvent(new MouseEvent('dblclick', { bubbles: true }));
    }, 50);
});

/* ══════════════════════════════════════
   FLIP  (v1 mechanism)
══════════════════════════════════════ */
function shadowPulse(id) {
    const el = document.getElementById(id);
    const half = DURATION * 0.48;
    el.style.transition = `background ${half}ms ease-in`;
    el.style.background = 'rgba(0,0,0,0.22)';
    setTimeout(() => {
        el.style.transition = `background ${half * 0.8}ms ease-out`;
        el.style.background = 'rgba(0,0,0,0)';
    }, half);
}

function flipNext() {
    if (flipping || page >= activeBinder.pages) return;
    flipping = true;

    const fR = document.getElementById('flipper-R');
    const fL = document.getElementById('flipper-L');

    // Phase 1: flipper-R folds into spine (0° → -90°) — stays in zone-R
    // Phase 2: flipper-L unfolds from spine (90° → 0°) — stays in zone-L
    // Spine is NEVER obscured by either flipper

    // Prep: new right bg revealed as flipper-R folds away
    fillPage('right-bg-grid',     page + 1, 'R');
    // Prep: new left page on flipper-L, ready to unfold
    fillPage('flip-L-front-grid', page + 1, 'L');

    shadowPulse('shadow-L');

    const half = Math.round(DURATION / 2);

    // Park flipper-L at 90° (edge-on, invisible) before animating
    fL.style.display    = 'block';
    fL.style.transition = 'none';
    fL.style.transform  = 'rotateY(90deg)';
    fL.offsetHeight; // flush style

    // Phase 1: fold right page toward spine
    fR.style.transition = `transform ${half}ms cubic-bezier(0.4, 0, 1, 0.8)`;
    fR.style.transform  = 'rotateY(-90deg)';

    setTimeout(() => {
        // flipper-R is now edge-on — hide it instantly
        fR.style.transition = 'none';
        fR.style.opacity    = '0';

        // Phase 2: unfold new left page from spine
        fL.style.transition = `transform ${half}ms cubic-bezier(0, 0.2, 0.6, 1)`;
        fL.style.transform  = 'rotateY(0deg)';

        setTimeout(() => {
            page++;
            fillPage('left-bg-grid',      page, 'L');
            fillPage('flip-R-front-grid', page, 'R');

            // Reset flipper-R
            fR.style.transition = 'none';
            fR.style.transform  = 'rotateY(0deg)';

            // Hide flipper-L
            fL.style.transition = 'none';
            fL.style.display    = 'none';
            fL.style.transform  = 'rotateY(0deg)';

            requestAnimationFrame(() => requestAnimationFrame(() => {
                fR.style.opacity = '1';
                renderDots();
                updateUI();
                renderSticker();
                flipping = false;
            }));
        }, half + 20);
    }, half);
}

function flipPrev() {
    if (flipping || page <= 1) return;
    flipping = true;

    const fL = document.getElementById('flipper-L');
    const fR = document.getElementById('flipper-R');

    // Phase 1: flipper-L folds into spine (0° → 90°) — stays in zone-L
    // Phase 2: flipper-R unfolds from spine (-90° → 0°) — stays in zone-R
    // Spine is NEVER obscured by either flipper

    // Prep: new left bg revealed as flipper-L folds away
    fillPage('left-bg-grid',      page - 1, 'L');
    // Prep: current left page on flipper-L so it folds away
    fillPage('flip-L-front-grid', page,     'L');
    // Prep: new right page on flipper-R, ready to unfold
    fillPage('flip-R-front-grid', page - 1, 'R');
    // right-bg stays as current page R — visible while flipper-R is hidden

    shadowPulse('shadow-R');

    const half = Math.round(DURATION / 2);

    // Show flipper-L covering current left page
    fL.style.display    = 'block';
    fL.style.transition = 'none';
    fL.style.transform  = 'rotateY(0deg)';

    // Hide flipper-R and park it at -90° (edge-on, ready to unfold)
    fR.style.transition = 'none';
    fR.style.opacity    = '0';
    fR.style.transform  = 'rotateY(-90deg)';
    fL.offsetHeight; // flush style

    // Phase 1: fold current left page toward spine
    fL.style.transition = `transform ${half}ms cubic-bezier(0.4, 0, 1, 0.8)`;
    fL.style.transform  = 'rotateY(90deg)';

    setTimeout(() => {
        // flipper-L is now edge-on — hide it instantly
        fL.style.transition = 'none';
        fL.style.display    = 'none';
        fL.style.transform  = 'rotateY(0deg)';

        // Make flipper-R visible and unfold from spine
        fR.style.transition = 'none';
        fR.style.opacity    = '1';
        fR.style.transform  = 'rotateY(-90deg)';
        fR.offsetHeight; // flush style

        // Phase 2: unfold new right page from spine
        fR.style.transition = `transform ${half}ms cubic-bezier(0, 0.2, 0.6, 1)`;
        fR.style.transform  = 'rotateY(0deg)';

        setTimeout(() => {
            page--;
            fillPage('right-bg-grid', page, 'R');

            renderDots();
            updateUI();
            renderSticker();
            flipping = false;
        }, half + 20);
    }, half);
}

function jumpTo(target) {
    if (flipping) return;
    const dist = Math.abs(target - page);
    if (dist === 0) return;
    // 거리에 상관없이 항상 애니메이션 1회
    target > page ? flipJumpForward(target) : flipJumpBackward(target);
}

function flipJumpForward(target) {
    if (flipping || target <= page || target > activeBinder.pages) return;
    flipping = true;

    const fR = document.getElementById('flipper-R');
    const fL = document.getElementById('flipper-L');

    fillPage('right-bg-grid',     target, 'R');
    fillPage('flip-L-front-grid', target, 'L');

    shadowPulse('shadow-L');

    const half = Math.round(DURATION / 2);

    fL.style.display    = 'block';
    fL.style.transition = 'none';
    fL.style.transform  = 'rotateY(90deg)';
    fL.offsetHeight;

    fR.style.transition = `transform ${half}ms cubic-bezier(0.4, 0, 1, 0.8)`;
    fR.style.transform  = 'rotateY(-90deg)';

    setTimeout(() => {
        fR.style.transition = 'none';
        fR.style.opacity    = '0';

        fL.style.transition = `transform ${half}ms cubic-bezier(0, 0.2, 0.6, 1)`;
        fL.style.transform  = 'rotateY(0deg)';

        setTimeout(() => {
            page = target;
            fillPage('left-bg-grid',      page, 'L');
            fillPage('flip-R-front-grid', page, 'R');

            fR.style.transition = 'none';
            fR.style.transform  = 'rotateY(0deg)';
            fL.style.transition = 'none';
            fL.style.display    = 'none';
            fL.style.transform  = 'rotateY(0deg)';

            requestAnimationFrame(() => requestAnimationFrame(() => {
                fR.style.opacity = '1';
                renderDots();
                updateUI();
                renderSticker();
                flipping = false;
            }));
        }, half + 20);
    }, half);
}

function flipJumpBackward(target) {
    if (flipping || target >= page || target < 1) return;
    flipping = true;

    const fL = document.getElementById('flipper-L');
    const fR = document.getElementById('flipper-R');

    fillPage('left-bg-grid',      target, 'L');
    fillPage('flip-L-front-grid', page,   'L');
    fillPage('flip-R-front-grid', target, 'R');

    shadowPulse('shadow-R');

    const half = Math.round(DURATION / 2);

    fL.style.display    = 'block';
    fL.style.transition = 'none';
    fL.style.transform  = 'rotateY(0deg)';

    fR.style.transition = 'none';
    fR.style.opacity    = '0';
    fR.style.transform  = 'rotateY(-90deg)';
    fL.offsetHeight;

    fL.style.transition = `transform ${half}ms cubic-bezier(0.4, 0, 1, 0.8)`;
    fL.style.transform  = 'rotateY(90deg)';

    setTimeout(() => {
        fL.style.transition = 'none';
        fL.style.display    = 'none';
        fL.style.transform  = 'rotateY(0deg)';

        fR.style.transition = 'none';
        fR.style.opacity    = '1';
        fR.style.transform  = 'rotateY(-90deg)';
        fR.offsetHeight;

        fR.style.transition = `transform ${half}ms cubic-bezier(0, 0.2, 0.6, 1)`;
        fR.style.transform  = 'rotateY(0deg)';

        setTimeout(() => {
            page = target;
            fillPage('right-bg-grid', page, 'R');

            renderDots();
            updateUI();
            renderSticker();
            flipping = false;
        }, half + 20);
    }, half);
}

function updateUI() {
    document.getElementById('btn-prev').disabled = page <= 1;
    document.getElementById('btn-next').disabled = page >= activeBinder.pages;
}

function initFill() {
    fillPage('left-bg-grid',      page, 'L');
    fillPage('right-bg-grid',     page, 'R');
    fillPage('flip-R-front-grid', page, 'R');
    fillPage('flip-L-front-grid', page, 'L');
}

document.getElementById('btn-prev').addEventListener('click', flipPrev);
document.getElementById('btn-next').addEventListener('click', flipNext);
document.addEventListener('keydown', e => {
    if (modal.classList.contains('open')) {
        if (e.key === 'Escape')     closeCardModal();
        if (e.key === 'ArrowRight') { if (modalCardIdx < modalCardList.length - 1) showModalCard(modalCardIdx + 1); }
        if (e.key === 'ArrowLeft')  { if (modalCardIdx > 0) showModalCard(modalCardIdx - 1); }
        return;
    }
    // DB 모달 열려있으면 바인더 페이지 넘기기 막기
    if (dbModal && dbModal.classList.contains('open')) return;
    if (e.key === 'ArrowRight') flipNext();
    if (e.key === 'ArrowLeft')  flipPrev();
});

/* wheel: Ctrl+wheel → zoom (modal or binder), plain wheel → page flip */
let wheelCooldown = false;
document.addEventListener('wheel', e => {
    // DB 모달 열려있으면 스크롤 그대로 허용
    if (dbModal && dbModal.classList.contains('open')) return;

    e.preventDefault();

    if (e.ctrlKey) {
        if (modal.classList.contains('open')) {
            // zoom card image in modal
            setModalScale(modalScale + (e.deltaY < 0 ? 0.15 : -0.15));
        } else {
            // zoom binder size
            if (e.deltaY < 0) { if (szIdx < PW_STEPS.length - 1) { szIdx++; applySize(); } }
            else               { if (szIdx > 0)                   { szIdx--; applySize(); } }
        }
        return;
    }

    // page flip — throttle to one flip per animation cycle
    if (wheelCooldown) return;
    if (e.deltaY > 0) flipNext();
    else              flipPrev();
    wheelCooldown = true;
    setTimeout(() => { wheelCooldown = false; }, DURATION + 80);
}, { passive: false });

function buildSeriesRow() {

    dbSeriesRow.innerHTML = series.map(s => `
        <button class="db-series-btn${dbActiveSeries === s.code ? ' active' : ''}" data-code="${s.code}">

async function selectSeries(code) {
    dbActiveSeries = code; dbView = 'packs';
    dbNav.classList.remove('visible');
    buildSeriesRow();
    dbContent.innerHTML = '';
    dbStatus.textContent = '불러오는 중...';
    if (dbLang === 'kr')      await loadKrPacks(code);
    else if (dbLang === 'jp') await loadJpPacks(code);
    else                      await loadEnSets(code);
}

async function loadKrPacks(seriesCode) {
    try {
        const url = `/data/kr/${seriesCode}.json`;
        if (!dbCache[url]) { const r = await fetch(url); dbCache[url] = await r.json(); }
        const raw = dbCache[url];
        const allPacks = Array.isArray(raw) ? raw : Object.values(raw);
        // 팩 코드 기준 중복 제거만 (소드/실드처럼 이미지 같아도 다른 팩이면 유지)
        const seenCodes = new Set();
        const packs = allPacks
            .filter(p => {
                if (seenCodes.has(p.code)) return false;
                seenCodes.add(p.code);
                return true;
            })
            // 출시일 역순 (최신순)
            .sort((a, b) => {
                const da = a.release_date || '0000-00-00';
                const db2 = b.release_date || '0000-00-00';
                return da > db2 ? -1 : da < db2 ? 1 : 0;
            });
        dbStatus.textContent = `${packs.length}개 팩`;
        dbContent.innerHTML = `<div class="db-pack-grid">${packs.map(p => `
            <div class="db-pack-item" data-code="${p.code}">
                <div class="db-pack-cover-wrap">
                    ${p.image_cover_url
                        ? `<img class="db-pack-cover" src="${p.image_cover_url}" loading="lazy" onerror="this.outerHTML='<div class=\\'db-pack-cover-placeholder\\'>📦</div>'">`
                        : `<div class="db-pack-cover-placeholder">📦</div>`}
                    ${p.image_symbol_url
                        ? `<img class="db-pack-symbol-badge" src="${p.image_symbol_url}" onerror="this.style.display='none'">`
                        : ''}
                </div>
                <div class="db-pack-info">
                    <div class="db-pack-code">${p.code}</div>
                    <div class="db-pack-name">${p.name}</div>
                    <div class="db-pack-meta">
                        📅 ${p.release_date || '?'}&nbsp;&nbsp;🃏 ${p.printed_total || p.total || '?'}장
                        ${p.price ? `<br>💰 ${p.price}` : ''}
                    </div>
                </div>
            </div>`).join('')}</div>`;
        dbContent.querySelectorAll('.db-pack-item').forEach(el => {
            const pack = packs.find(p => p.code === el.dataset.code);
            if (pack) el.addEventListener('click', () => showKrCards(pack));
        });
    } catch(e) { dbStatus.textContent = '로딩 오류. 잠시 후 다시 시도하세요.'; }
}
