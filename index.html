async function showKrCards(pack) {
    dbView = 'cards';
    const series = (pack.series && pack.series[0]) || '';

    let cards;
    if (pack.card_list_detail && pack.card_list_detail.length > 0) {
        const seen = new Set();
        cards = pack.card_list_detail.filter(c => {
            const key = String(c.num);
            if (seen.has(key)) return false;
            seen.add(key);
            return true;
        });
        cards.sort((a, b) => (parseInt(a.num,10)||0) - (parseInt(b.num,10)||0));
    } else {
        const total = parseInt(pack.total || pack.printed_total || 0, 10);
        cards = Array.from({ length: total }, (_, i) => ({
            num: String(i + 1).padStart(3, '0'), name: '', rarity: ''
        }));
    }

    dbNav.classList.add('visible');
    dbNavText.textContent = pack.name;
    dbStatus.textContent = '카드 불러오는 중...';

    // artofpkm 이미지 시도
    let thumbUrls, fullUrls;
    if (pack.artofpkm_id) {
        try {
            const r = await fetch(`/api/artofpkm/${pack.artofpkm_id}`);
            const j = await r.json();
            if (j.cards && j.cards.length > 0) {
                // artofpkm 카드 수가 card_list보다 적을 수 있으므로 인덱스 안전 처리
                thumbUrls = cards.map((_, i) => j.cards[i] ? j.cards[i].thumb : null);
                fullUrls  = cards.map((_, i) => j.cards[i] ? j.cards[i].full  : null);
            }
        } catch(e) { /* fallthrough to KR CDN */ }
    }

    // Korean CDN fallback
    if (!thumbUrls) {
        thumbUrls = cards.map(c => {
            const num = String(c.num).padStart(3, '0');
            return `https://cards.image.pokemonkorea.co.kr/data/wmimages/${series}/${pack.code}/${pack.code}_${num}.png?w=200`;
        });
        fullUrls = cards.map(c => {
            const num = String(c.num).padStart(3, '0');
            return `https://cards.image.pokemonkorea.co.kr/data/wmimages/${series}/${pack.code}/${pack.code}_${num}.png?w=512`;
        });
    }

    dbStatus.textContent = `총 ${pack.printed_total || pack.total || cards.length}종 · ${cards.length}장 표시`;
    dbContent.innerHTML = `<div class="db-card-grid">${cards.map((c, i) => {
        const rarColor = RARITY_COLOR[c.rarity] || 'rgba(255,255,255,0.3)';
        const rarBadge = c.rarity ? `<div class="db-card-rarity" style="color:${rarColor};border-color:${rarColor}40">${c.rarity}</div>` : '';
        const imgSrc = thumbUrls[i] || '';
        return `
        <div class="db-card-item" data-idx="${i}" title="${c.num} ${c.name}${c.rarity ? ' ['+c.rarity+']' : ''}">
            <img src="${imgSrc}" loading="lazy" alt="${c.name}" onerror="this.parentElement.style.opacity='0.15'">
            ${rarBadge}
            <div class="db-card-label">${c.num}  ${c.name}</div>
            <button class="db-add-btn" data-idx="${i}">+ 바인더</button>
        </div>`;
    }).join('')}</div>`;
    dbContent.querySelectorAll('.db-card-item').forEach(el => {
        el.addEventListener('click', e => {
            if (e.target.closest('.db-add-btn')) {
                enterSlotPickMode(fullUrls[+el.dataset.idx]);
            } else {
                openCardModalFromDb(fullUrls, +el.dataset.idx);
            }
        });
    });
}

function getJpSymbolUrl(code, serie) {
    const krCdn = 'https://cards.image.pokemonkorea.co.kr/data/images/symbol/';
    const tcgIo = (id) => `https://images.pokemontcg.io/${id}/symbol.png`;

    if (serie === 'MEGA') return null; // artofpkm covers all MEGA sets

    if (serie === 'SV' || serie === 'SS') return krCdn + code + '.png';

    if (serie === 'SM') {
        const KR_SM_OK = new Set(['SM6b','SM11a','SM11b','SM12','SM12a']);
        if (KR_SM_OK.has(code)) return krCdn + code + '.png';
        const SM_EN_MAP = {
            'SM1S':'sm1','SM1M':'sm1','SM2K':'sm2','SM2L':'sm2',
            'SM3H':'sm3','SM3N':'sm3','SM4S':'sm4','SM4A':'sm4',
            'SM5S':'sm5','SM5M':'sm5','SM6':'sm6',
            'SM6a':'sm7','SM7':'sm7','SM7a':'sm7pt5','SM7b':'sm7pt5',
            'SM8':'sm8','SM8a':'sm8pt5','SM8b':'sm8pt5',
            'SM9':'sm9','SM9a':'sm9pt5','SM9b':'sm9pt5',
            'SM10':'sm10','SM10b':'sm10pt5','sn11':'sm11'
        };
        const enId = SM_EN_MAP[code];
        return enId ? tcgIo(enId) : null;
    }

    if (serie === 'XY') {
        const XY_EN_MAP = {
            'XY1a':'xy1','XY1b':'xy2','XY2':'xy3','XY3':'xy4',
            'XY4':'xy5','XY5a':'xy6','XY5b':'xy6','XY6':'xy7',
            'XY7':'xy8','XY8a':'xy9','XY8b':'xy9','XY9':'xy10',
            'XY10':'xy11','XY11a':'xy12','XY11b':'xy12','XY12':'xy12'
        };
        const enId = XY_EN_MAP[code];
        return enId ? tcgIo(enId) : null;
    }

    if (serie === 'BW') {
        const BW_EN_MAP = {
            'BW1a':'bw1','BW1b':'bw1','BW2':'bw2','BW3a':'bw3',
            'BW3b':'bw3','BW4':'bw4','BW5a':'bw5','BW5b':'bw5',
            'BW6a':'bw6','BW6b':'bw6','BW7':'bw7','BW8a':'bw8',
            'BW8b':'bw8','BW9':'bw9','BWH1':'bw10'
        };
        const enId = BW_EN_MAP[code];
        return enId ? tcgIo(enId) : null;
    }

    return null;
}

async function showJpCards(pack) {
    dbView = 'cards';
    dbNav.classList.add('visible');
    dbNavText.textContent = `${pack.name} (${pack.name_en || pack.code})`;
    dbStatus.textContent = '카드 불러오는 중...';
    dbContent.innerHTML = '';

    const serie = pack.tcgdex_serie || 'SV';
    const total = pack.total || pack.printed_total || 0;

    function renderCards(cards) {
        const fullUrls = cards.map(c => c.full);
        dbStatus.textContent = `총 ${cards.length}장`;
        dbContent.innerHTML = `<div class="db-card-grid">${cards.map((c, i) => `
            <div class="db-card-item" data-idx="${i}" title="${c.label}">
                <img src="${c.thumb}" loading="lazy" alt="${c.label}" onerror="this.parentElement.style.opacity='0.15'">
                <div class="db-card-label">${c.label}</div>
                <button class="db-add-btn" data-idx="${i}">+ 바인더</button>
            </div>`).join('')}</div>`;
        dbContent.querySelectorAll('.db-card-item').forEach(el => {
            el.addEventListener('click', e => {
                if (e.target.closest('.db-add-btn')) {
                    enterSlotPickMode(fullUrls[+el.dataset.idx]);
                } else {
                    openCardModalFromDb(fullUrls, +el.dataset.idx);
                }
            });
        });
    }

    function useTcgdex() {
        const cards = Array.from({ length: total }, (_, i) => {
            const num = String(i + 1).padStart(3, '0');
            return {
                thumb: `https://assets.tcgdex.net/ja/${serie}/${pack.code}/${num}/low.webp`,
                full:  `https://assets.tcgdex.net/ja/${serie}/${pack.code}/${num}/high.webp`,
                label: num
            };
        });
        renderCards(cards);
    }

    function showRetry(msg) {
        dbStatus.textContent = msg;
        dbContent.innerHTML = `<div style="text-align:center;padding:40px;color:rgba(160,200,255,0.7)">
            <div style="font-size:14px;margin-bottom:16px">${msg}</div>
            <button onclick="showJpCards(window.__retryPack)" style="padding:8px 20px;background:rgba(100,160,255,0.2);border:1px solid rgba(100,160,255,0.4);border-radius:8px;color:#fff;cursor:pointer;font-size:13px">🔄 재시도</button>
        </div>`;
        window.__retryPack = pack;
    }

    if (pack.artofpkm_id) {
        try {
            const r = await fetch(`/api/artofpkm/${pack.artofpkm_id}`);
            const j = await r.json();
            if (j.cards && j.cards.length > 0) {
                const cards = j.cards.map((c, i) => {
                    const m = c.file && c.file.match(/^\d+_[PTE]_(.+)\.jpg$/i);
                    const name = m ? m[1].replace(/_/g, ' ') : String(i + 1).padStart(3, '0');
                    return { thumb: c.thumb, full: c.full, label: name };
                });
                renderCards(cards);
            } else {
                // artofpkm_id set but returned 0 cards — likely rate-limited, offer retry
                showRetry('artofpkm 로딩 중... (서버가 응답 중입니다)');
            }
        } catch(e) {
            showRetry(`로딩 실패 (${e.message})`);
        }
    } else {
        useTcgdex();
    }
}

function saveToLocalStorage() {
    try {
        localStorage.setItem('pb_binders',  JSON.stringify(BINDERS));
        localStorage.setItem('pb_nextId',   String(nextId));
        localStorage.setItem('pb_stickers', JSON.stringify(stickerData));
        /* data: URL은 용량이 크므로 제외 — https URL 카드만 저장 */
        const slim = {};
        Object.entries(cardData).forEach(([k, arr]) => {
            const f = arr.map(v => (v && !v.startsWith('data:')) ? v : null);
            if (f.some(Boolean)) slim[k] = f;
        });
        localStorage.setItem('pb_cards', JSON.stringify(slim));
    } catch(e) { console.warn('localStorage 저장 실패:', e); }
}

function loadFromLocalStorage() {
    try {
        const rawB = localStorage.getItem('pb_binders');
        const rawC = localStorage.getItem('pb_cards');
        const rawN = localStorage.getItem('pb_nextId');
        const rawS = localStorage.getItem('pb_stickers');
        if (rawB) {
            const parsed = JSON.parse(rawB);
            if (Array.isArray(parsed) && parsed.length) {
                BINDERS.length = 0;
                parsed.forEach(b => BINDERS.push(b));
                activeBinder = BINDERS[0];
                nextId = rawN ? +rawN : Math.max(...BINDERS.map(b => +b.id || 0)) + 1;
            }
        }
        if (rawC) Object.assign(cardData, JSON.parse(rawC));
        if (rawS) Object.assign(stickerData, JSON.parse(rawS));
    } catch(e) { console.warn('localStorage 로드 실패:', e); }
}

/* ══════════════════════════════════════
   STICKERS (페이지 표시 스티커)
══════════════════════════════════════ */
/* 모든 페이지의 탭을 동시에 오른쪽 엣지에 렌더링
 * 포스트잇처럼 여러 탭이 다른 높이에 걸쳐서 보임 */
function tabTopPct(sp, total) {
    if (total <= 1) return 6;
    return 4 + (sp - 1) / (total - 1) * 34; // 4% ~ 38% (오른쪽 위쪽에만 집중)
}

function renderSticker() {
    const layer = document.getElementById('sticker-layer');
    if (!layer) return;

    // 팝업 닫혔는지 체크해서 유지
    const hadPopup = !!document.getElementById('sticker-popup');
    if (hadPopup) return; // 팝업 열린 동안은 탭 재렌더 안 함

    layer.innerHTML = '';
    const total = activeBinder.pages;

    for (let sp = 1; sp <= total; sp++) {
        const key   = `${activeBinder.id}_${sp}`;
        const st    = stickerData[key];
        const top   = tabTopPct(sp, total);
        const isCur = sp === page;

        if (st) {
            /* ── 채워진 탭 ── */
            const tab = document.createElement('div');
            tab.className = `page-tab${isCur ? ' active' : ''}`;
            tab.style.cssText = `top:${top}%; background:${st.color};`;
            tab.title = `${sp}페이지 — ${st.text}`;

            const lbl = document.createElement('span');
            lbl.className = 'tab-label';
            lbl.textContent = st.text.slice(0, 5); // 세로 텍스트 최대 5자
            tab.appendChild(lbl);

            const del = document.createElement('button');
            del.className = 'tab-del';
            del.title = '스티커 삭제';
            del.textContent = '×';
            del.addEventListener('click', e => {
                e.stopPropagation();
                delete stickerData[key];
                saveToLocalStorage();
                renderSticker();
            });
            tab.appendChild(del);

            tab.addEventListener('click', e => {
                if (e.target.closest('.tab-del')) return;
                if (sp !== page) jumpTo(sp);        // 다른 페이지 → 즉시 이동
                else openStickerEdit(key, st);      // 현재 페이지 → 편집
            });
            layer.appendChild(tab);

        } else if (isCur) {
            /* ── 현재 페이지 + 스티커 없음 → + 탭 ── */
            const btn = document.createElement('div');
            btn.className = 'tab-add';
            btn.style.top = `${top}%`;
            btn.title = '이 페이지에 스티커 추가';
            btn.textContent = '+';
            btn.addEventListener('click', () => openStickerEdit(key, null));
            layer.appendChild(btn);
        }
    }
}

function openStickerEdit(key, existing) {
    const layer   = document.getElementById('sticker-layer');
    let selColor  = existing?.color || STICKER_COLORS[0];
    const curText = existing?.text  || '';

    // 기존 팝업 제거
    const old = document.getElementById('sticker-popup');
    if (old) old.remove();

    // 팝업 위치: 해당 탭 높이 근처
    const sp    = parseInt(key.split('_').pop());
    const total = activeBinder.pages;
    const top   = tabTopPct(sp, total);

    const popup = document.createElement('div');
    popup.id        = 'sticker-popup';
    popup.className = 'sticker-popup';
    // 팝업이 화면 위아래 벗어나지 않도록 clamp
    const clampedTop = Math.min(Math.max(top, 4), 55);
    popup.style.cssText = `top:calc(${clampedTop}% - 8px); right:22px;`;

    popup.innerHTML = `
        <div style="font-size:11px;color:rgba(255,255,255,0.45);margin-bottom:8px;font-weight:600;">
            ${sp}페이지 스티커
        </div>
        <div class="sticker-swatches">
            ${STICKER_COLORS.map(c =>
                `<div class="sticker-swatch${c===selColor?' sel':''}" style="background:${c}" data-c="${c}"></div>`
            ).join('')}
        </div>
        <input class="sticker-popup-inp" id="sticker-text-inp"
               type="text" placeholder="스티커 이름 (예: 스타터덱)"
               maxlength="18" value="${curText}">
        <div class="sticker-popup-btns">
            <button class="sticker-ok" id="sticker-ok">확인</button>
            <button class="sticker-cx" id="sticker-cx">취소</button>
        </div>`;

    layer.appendChild(popup);

    popup.querySelectorAll('.sticker-swatch').forEach(sw => {
        sw.addEventListener('click', () => {
            popup.querySelectorAll('.sticker-swatch').forEach(s => s.classList.remove('sel'));
            sw.classList.add('sel');
            selColor = sw.dataset.c;
        });
    });

    const inp = document.getElementById('sticker-text-inp');
    inp.focus(); inp.select();

    const save = () => {
        const val = inp.value.trim();
        if (val) {
            stickerData[key] = { text: val, color: selColor };
            saveToLocalStorage();
        }
        popup.remove();
        renderSticker();
    };

    document.getElementById('sticker-ok').addEventListener('click', save);
    document.getElementById('sticker-cx').addEventListener('click', () => {
        popup.remove(); renderSticker();
    });
    inp.addEventListener('keydown', e => {
        e.stopPropagation();
        if (e.key === 'Enter')  { e.preventDefault(); save(); }
        if (e.key === 'Escape') { popup.remove(); renderSticker(); }
    });

    // 팝업 외부 클릭 시 닫기
    const outsideClick = e => {
        if (!popup.contains(e.target)) {
            popup.remove();
            renderSticker();
            document.removeEventListener('mousedown', outsideClick);
        }
    };
    setTimeout(() => document.addEventListener('mousedown', outsideClick), 50);
}

const modal         = document.getElementById('card-modal');
const modalImg      = document.getElementById('card-modal-img');
const modalClose    = document.getElementById('card-modal-close');
const modalBackdrop = document.getElementById('card-modal-backdrop');
const modalPrev     = document.getElementById('modal-prev');
const modalNext     = document.getElementById('modal-next');
const modalCounter  = document.getElementById('card-modal-counter');

let modalCardList = [];  // flat list of all filled pockets in current binder
let modalCardIdx  = 0;
let modalScale    = 1;

function buildCardList() {
    const list = [];
    for (let sp = 1; sp <= activeBinder.pages; sp++) {
        for (const side of ['L', 'R']) {
            getCards(activeBinder.id, sp, side).forEach((src, idx) => {
                if (src) list.push({ sp, side, idx, src });
            });
        }
    }
    return list;
}

function setModalScale(s) {
    const baseW = Math.min(380, window.innerWidth * 0.78);
    const maxW  = window.innerWidth - 180; // 버튼(40px*2) + gap + 여백
    modalScale  = Math.min(maxW / baseW, Math.max(0.3, s));
    if (Math.abs(modalScale - 1) < 0.02) {
        // 1배 근처면 CSS 기본값으로 리셋
        modalImg.style.width    = '';
        modalImg.style.maxWidth = '';
        modalImg.style.maxHeight = '';
    } else {
        modalImg.style.width     = Math.round(baseW * modalScale) + 'px';
        modalImg.style.maxWidth  = 'none';
        modalImg.style.maxHeight = 'none';
    }
    modalImg.style.transform = 'none';
}

function showModalCard(pos) {
    modalImg.style.opacity = '0';
    setTimeout(() => {
        modalImg.src = modalCardList[pos].src;
        modalImg.style.opacity = '1';
        modalCardIdx = pos;
        modalCounter.textContent = `${pos + 1} / ${modalCardList.length}`;
        modalPrev.disabled = pos === 0;
        modalNext.disabled = pos === modalCardList.length - 1;
    }, 80);
}

function openCardModal(src, sp, side, idx) {
    modalCardList = buildCardList();
    const pos = modalCardList.findIndex(c => c.sp === sp && c.side === side && c.idx === idx);
    modalCardIdx = pos >= 0 ? pos : 0;
    setModalScale(1);
    modalImg.style.transition = 'opacity 0.1s ease, transform 0.15s ease';
    modalImg.src = src;
    modalImg.style.opacity = '1';
    modalCounter.textContent = `${modalCardIdx + 1} / ${modalCardList.length}`;
    modalPrev.disabled = modalCardIdx === 0;
    modalNext.disabled = modalCardIdx === modalCardList.length - 1;
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
}
function closeCardModal() {
    modal.classList.remove('open');
    document.body.style.overflow = '';
    setModalScale(1);
}

function openCardModalFromDb(imgUrls, startIdx) {
    modalCardList = imgUrls.map(u => ({ src: u }));
    modalCardIdx  = startIdx;
    setModalScale(1);
    modalImg.style.transition = 'opacity 0.1s ease';
    modalImg.src = imgUrls[startIdx];
    modalImg.style.opacity = '1';
    modalCounter.textContent = `${startIdx + 1} / ${imgUrls.length}`;
    modalPrev.disabled = startIdx === 0;
    modalNext.disabled = startIdx === imgUrls.length - 1;
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
}

modalClose.addEventListener('click', closeCardModal);
modalBackdrop.addEventListener('click', closeCardModal);
modalPrev.addEventListener('click', () => { if (modalCardIdx > 0) showModalCard(modalCardIdx - 1); });
modalNext.addEventListener('click', () => { if (modalCardIdx < modalCardList.length - 1) showModalCard(modalCardIdx + 1); });

/* ══════════════════════════════════════
   SUPABASE AUTH & SYNC
══════════════════════════════════════ */

/* ── 사이드바 푸터 UI 업데이트 ── */
function getDisplayName(user) {
    return (user?.user_metadata?.display_name) || (user?.email?.split('@')[0]) || '?';
}

function updateAuthUI(user) {
    const footer = document.querySelector('.sidebar-footer');
    const avatar = footer.querySelector('.avatar');
    const hint   = footer.querySelector('.login-hint');
    const btn    = footer.querySelector('.login-btn-sm');
    if (user) {
        const name = getDisplayName(user);
        avatar.textContent = name.slice(0, 2).toUpperCase();
        avatar.title = user.email;
        hint.textContent = name;
        hint.title = '더블클릭해서 닉네임 변경';
        hint.style.cursor = 'pointer';
        hint.ondblclick = () => editNickname(user, hint, avatar);
        btn.textContent = '로그아웃';
        btn.onclick = sbSignOut;
    } else {
        avatar.textContent = '?';
        hint.textContent = '로그인하세요';
        hint.style.cursor = '';
        hint.title = '';
        hint.ondblclick = null;
        btn.textContent = '로그인';
        btn.onclick = () => openAuthModal();
    }
}

async function editNickname(user, hint, avatar) {
    if (!sb || !sbUser) return;
    const current = getDisplayName(user);
    const input = document.createElement('input');
    input.className = 'inline-edit';
    input.value = current;
    input.style.cssText = 'width:90px;font-size:11px;padding:2px 5px;';
    hint.replaceWith(input);
    input.focus(); input.select();

    const save = async () => {
        const val = input.value.trim() || current;
        /* 원래 hint 복원 */
        const newHint = document.createElement('span');
        newHint.className = 'login-hint';
        input.replaceWith(newHint);
        /* Supabase에 저장 */
        const { data, error } = await sb.auth.updateUser({ data: { display_name: val } });
        if (!error && data?.user) {
            sbUser = data.user;
            updateAuthUI(sbUser);
        } else {
            updateAuthUI(sbUser);
        }
    };
    input.addEventListener('blur', save);
    input.addEventListener('keydown', e => {
        if (e.key === 'Enter')  { e.preventDefault(); save(); }
        if (e.key === 'Escape') { input.value = current; save(); }
    });
}

/* ── Auth 모달 ── */
let authMode = 'login'; // 'login' | 'signup'

function openAuthModal() {
    if (!sb) {
        alert('Supabase가 설정되지 않았습니다.\nindex.html 상단의 SUPABASE_URL, SUPABASE_KEY를 입력해주세요.');
        return;
    }
    document.getElementById('auth-err').textContent = '';
    document.getElementById('auth-email').value = '';
    document.getElementById('auth-pw').value = '';
    authMode = 'login';
    updateAuthModalMode();
    document.getElementById('auth-overlay').classList.add('open');
    setTimeout(() => document.getElementById('auth-email').focus(), 100);
}

function updateAuthModalMode() {
    document.getElementById('auth-title').textContent  = authMode === 'login' ? '로그인' : '회원가입';
    document.getElementById('auth-sub').textContent    = authMode === 'login'
        ? 'Supabase 계정으로 데이터를 클라우드에 저장하세요'
        : '새 계정을 만들어 포켓몬 카드를 저장하세요';
    document.getElementById('auth-submit').textContent = authMode === 'login' ? '로그인' : '회원가입';
    document.getElementById('auth-mode-toggle').textContent = authMode === 'login' ? '회원가입' : '로그인';
}

document.getElementById('auth-mode-toggle').addEventListener('click', () => {
    authMode = authMode === 'login' ? 'signup' : 'login';
    updateAuthModalMode();
    document.getElementById('auth-err').textContent = '';
});

document.getElementById('auth-cancel').addEventListener('click',  () => {
    document.getElementById('auth-overlay').classList.remove('open');
});

document.getElementById('auth-submit').addEventListener('click', async () => {
    const email = document.getElementById('auth-email').value.trim();
    const pw    = document.getElementById('auth-pw').value;
    const errEl = document.getElementById('auth-err');
    const btn   = document.getElementById('auth-submit');
    if (!email || !pw) { errEl.textContent = '이메일과 비밀번호를 입력해주세요.'; return; }
    btn.disabled = true; btn.textContent = '처리 중...';
    errEl.textContent = '';
    try {
        let res;
        if (authMode === 'login') {
            res = await sb.auth.signInWithPassword({ email, password: pw });
        } else {
            res = await sb.auth.signUp({ email, password: pw });
        }
        if (res.error) {
            errEl.textContent = res.error.message;
        } else {
            document.getElementById('auth-overlay').classList.remove('open');
            if (authMode === 'signup' && !res.data.session) {
                alert('확인 이메일을 보냈습니다. 이메일을 확인한 후 로그인해주세요.');
            }
        }
    } catch(e) {
        errEl.textContent = e.message;
    }
    btn.disabled = false;
    btn.textContent = authMode === 'login' ? '로그인' : '회원가입';
});

/* Enter 키 지원 */
['auth-email','auth-pw'].forEach(id =>
    document.getElementById(id).addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('auth-submit').click();
    })
);

/* ── 로그아웃 ── */
async function sbSignOut() {
    if (!sb) return;
    await sb.auth.signOut();
    sbUser = null;
    updateAuthUI(null);
    /* 로그아웃 후 localStorage에 저장된 데이터 복원 (데이터를 날리지 않음) */
    BINDERS.length = 0;
    Object.keys(cardData).forEach(k => delete cardData[k]);
    Object.keys(stickerData).forEach(k => delete stickerData[k]);
    loadFromLocalStorage();
    if (!BINDERS.length) {
        BINDERS.push(
            { id: 1, name: '스칼렛 & 바이올렛', color: '#6060ff', pages: 5, type: '9포켓' },
            { id: 2, name: '소드 & 실드',       color: '#40b080', pages: 4, type: '9포켓' },
            { id: 3, name: '탑로더 컬렉션',     color: '#e06040', pages: 3, type: '탑로더' }
        );
        nextId = 4;
    }
    activeBinder = BINDERS[0];
    page = 1;
    updateTopbar(); renderDots(); updateUI(); renderSidebar(); initFill();
    renderSticker();
}

/* ── Supabase에서 데이터 불러오기 ── */
async function loadFromSb(userId) {
    if (!sb || !userId) return;
    const { data: rows } = await sb.from('binders')
        .select('*').eq('user_id', userId).order('sort_order');
    if (rows && rows.length > 0) {
        BINDERS.length = 0;
        rows.forEach(r => BINDERS.push({ id: r.id, name: r.name, color: r.color, type: r.type, pages: r.pages }));
        nextId = Math.max(...BINDERS.map(b => b.id)) + 1;
        activeBinder = BINDERS[0];
    }
    /* 카드 불러오기 */
    const binderIds = BINDERS.map(b => b.id);
    if (binderIds.length > 0) {
        const { data: cards } = await sb.from('cards').select('*').in('binder_id', binderIds);
        Object.keys(cardData).forEach(k => delete cardData[k]);
        Object.keys(stickerData).forEach(k => delete stickerData[k]);
        if (cards) {
            cards.forEach(c => {
                const key = `${c.binder_id}_${c.sp}_${c.side}`;
                if (!cardData[key]) cardData[key] = Array(9).fill(null);
                cardData[key][c.slot] = c.image_url;
            });
        }
    }
    page = 1;
    updateTopbar(); renderDots(); updateUI(); renderSidebar(); initFill();
    renderSticker();
}

/* ── 바인더 저장 ── */
async function sbSaveBinder(b) {
    if (!sb || !sbUser) return;
    const isLocalId = typeof b.id === 'number' && b.id < 100000;
    const { data, error } = await sb.from('binders').upsert({
        ...(isLocalId ? {} : { id: b.id }),
        user_id: sbUser.id, name: b.name, color: b.color,
        type: b.type, pages: b.pages, sort_order: BINDERS.indexOf(b)
    }, { onConflict: 'id' }).select();

    /* Supabase가 새 ID를 생성한 경우 로컬 바인더 ID를 갱신하고 카드 키도 재매핑 */
    if (!error && data && data[0] && data[0].id !== b.id) {
        const oldId = b.id;
        const newId = data[0].id;
        b.id = newId;
        /* cardData 키 재매핑: "oldId_sp_side" → "newId_sp_side" */
        Object.keys(cardData)
            .filter(k => k.startsWith(String(oldId) + '_'))
            .forEach(k => {
                cardData[String(newId) + k.slice(String(oldId).length)] = cardData[k];
                delete cardData[k];
            });
        /* stickerData 키 재매핑 */
        Object.keys(stickerData)
            .filter(k => k.startsWith(String(oldId) + '_'))
            .forEach(k => {
                stickerData[String(newId) + k.slice(String(oldId).length)] = stickerData[k];
                delete stickerData[k];
            });
        saveToLocalStorage();
    }
}

/* ── 카드 저장 (이미지 URL / data URL 모두 처리) ── */
async function sbSaveCard(binderId, sp, side, slot, imageUrl) {
    if (!sb || !sbUser || !imageUrl) return;
    let url = imageUrl;
    /* data URL이면 Supabase Storage에 업로드 */
    if (imageUrl.startsWith('data:')) {
        try {
            const res = await fetch(imageUrl);
            const blob = await res.blob();
            const ext  = blob.type.split('/')[1] || 'jpg';
            const path = `${sbUser.id}/${binderId}_${sp}_${side}_${slot}.${ext}`;
            const { error } = await sb.storage.from('card-images').upload(path, blob, { upsert: true });
            if (!error) {
                const { data: pub } = sb.storage.from('card-images').getPublicUrl(path);
                url = pub.publicUrl;
                /* 메모리도 public URL로 교체 */
                getCards(binderId, sp, side)[slot] = url;
            }
        } catch(e) { console.warn('Storage upload failed:', e); }
    }
    await sb.from('cards').upsert(
        { binder_id: binderId, sp, side, slot, image_url: url },
        { onConflict: 'binder_id,sp,side,slot' }
    );
}

/* ── 카드 삭제 ── */
async function sbDeleteCard(binderId, sp, side, slot) {
    if (!sb || !sbUser) return;
    await sb.from('cards').delete()
        .eq('binder_id', binderId).eq('sp', sp).eq('side', side).eq('slot', slot);
}

/* ── Auth 상태 변경 감지 ── */
(async () => {
    updateAuthUI(null); // 초기 상태
    if (!sb) return;

    const { data: { session } } = await sb.auth.getSession();
    if (session?.user) {
        sbUser = session.user;
        updateAuthUI(sbUser);
        await loadFromSb(sbUser.id);
    }

    sb.auth.onAuthStateChange(async (event, session) => {
        if (event === 'SIGNED_IN' && session?.user) {
            sbUser = session.user;
            updateAuthUI(sbUser);
            await loadFromSb(sbUser.id);
        } else if (event === 'SIGNED_OUT') {
            /* sbSignOut() 에서 이미 처리하므로 여기선 UI만 갱신 */
            sbUser = null;
            updateAuthUI(null);
        }
    });
})();

/* ── 사이드바 로그인 버튼 초기 연결 ── */
document.querySelector('.login-btn-sm').addEventListener('click', function() {
    if (!sbUser) openAuthModal();
});

</script>
